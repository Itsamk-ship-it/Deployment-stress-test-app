application:
  name: vast-flare-deployment-stress-test-app
  pods:
    # Single app pod: runs the Next.js web server AND the BullMQ worker (embedded,
    # see Dockerfile entrypoint). There is intentionally NO separate worker pod —
    # a background worker has no listening port, and Nexlayer creates a Kubernetes
    # Service per pod, so a portless worker pod fails with "Service is invalid".
    - name: web
      image: "# filled by pipeline"
      path: /
      servicePorts:
        - 3000
      vars:
        NODE_ENV: production
        PORT: "3000"
        HOSTNAME: "0.0.0.0"
        POD_ROLE: web
        APP_URL: "<% URL %>"
        AUTH_SECRET: "change-me-to-a-long-random-string-at-least-32-chars"
        DATABASE_URL: "postgresql://postgres:postgres@${postgres:5432}/stresstest?schema=public"
        REDIS_URL: "redis://${redis:6379}"
        WEBHOOK_SECRET: "change-me-webhook-secret"
        EMAIL_FROM: "Stress Test <no-reply@stresstest.local>"
        UPLOAD_DIR: "/app/uploads"
    - name: postgres
      image: mirror.gcr.io/library/postgres:16-alpine
      servicePorts:
        - 5432
      vars:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: stresstest
    - name: redis
      image: mirror.gcr.io/library/redis:7-alpine
      servicePorts:
        - 6379
      vars: {}
