application:
  name: vast-flare-deployment-stress-test-app
  pods:
    - name: web
      image: "# filled by pipeline"
      path: /
      servicePorts:
        - 3000
      vars:
        - {key: NODE_ENV, value: production}
        - {key: PORT, value: "3000"}
        - {key: HOSTNAME, value: "0.0.0.0"}
        - {key: POD_ROLE, value: web}
        - {key: APP_URL, value: "<% URL %>"}
        - {key: AUTH_SECRET, value: "change-me-to-a-long-random-string-at-least-32-chars"}
        - {key: DATABASE_URL, value: "postgresql://postgres:postgres@${postgres:5432}/stresstest?schema=public"}
        - {key: REDIS_URL, value: "redis://${redis:6379}"}
        - {key: WEBHOOK_SECRET, value: "change-me-webhook-secret"}
        - {key: EMAIL_FROM, value: "Stress Test <no-reply@stresstest.local>"}
        - {key: UPLOAD_DIR, value: "/app/uploads"}
    - name: worker
      image: "# filled by pipeline"
      vars:
        - {key: NODE_ENV, value: production}
        - {key: POD_ROLE, value: worker}
        - {key: APP_URL, value: "<% URL %>"}
        - {key: DATABASE_URL, value: "postgresql://postgres:postgres@${postgres:5432}/stresstest?schema=public"}
        - {key: REDIS_URL, value: "redis://${redis:6379}"}
        - {key: WEBHOOK_SECRET, value: "change-me-webhook-secret"}
        - {key: EMAIL_FROM, value: "Stress Test <no-reply@stresstest.local>"}
        - {key: UPLOAD_DIR, value: "/app/uploads"}
    - name: postgres
      image: mirror.gcr.io/library/postgres:16-alpine
      servicePorts:
        - 5432
      vars:
        - {key: POSTGRES_USER, value: postgres}
        - {key: POSTGRES_PASSWORD, value: postgres}
        - {key: POSTGRES_DB, value: stresstest}
    - name: redis
      image: mirror.gcr.io/library/redis:7-alpine
      servicePorts:
        - 6379
      vars: []
