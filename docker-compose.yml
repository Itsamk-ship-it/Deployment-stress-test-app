services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stresstest
    ports:
      # Host port 5544 to avoid clashing with anything already on 5432/5433.
      - "5544:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      # Host port 6380 to avoid clashing with a native Redis on 6379.
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      target: runner
    restart: unless-stopped
    command: node server.js
    environment:
      NODE_ENV: production
      APP_URL: http://localhost:3000
      AUTH_SECRET: change-me-to-a-long-random-string-at-least-32-chars
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stresstest?schema=public
      REDIS_URL: redis://redis:6379
      WEBHOOK_SECRET: change-me-webhook-secret
      EMAIL_FROM: "Stress Test <no-reply@stresstest.local>"
      UPLOAD_DIR: /app/uploads
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    command: node_modules/.bin/tsx src/worker/index.ts
    environment:
      NODE_ENV: production
      APP_URL: http://web:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stresstest?schema=public
      REDIS_URL: redis://redis:6379
      WEBHOOK_SECRET: change-me-webhook-secret
      EMAIL_FROM: "Stress Test <no-reply@stresstest.local>"
      UPLOAD_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  redisdata:
  uploads:
